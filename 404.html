<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Пиле Пиле</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect workaround
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // pile-pile-beta

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          '/pile-pile-beta/?' +
          l.pathname
            .slice(0, l.pathname.lastIndexOf('/') + 1)
            .slice(0, -1)
            .split('/')
            .slice(-pathSegmentsToKeep)
            .join('/') +
          (l.search ? '&' + l.search.slice(1) : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
